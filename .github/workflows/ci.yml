name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orchestrator:
    name: orchestrator (lint + type + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: orchestrator/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        # Skip mypy on tests — they use heavy mocking that's noisy to type.
        run: mypy src

      - name: Tests
        run: pytest -q

  dashboard:
    name: dashboard (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        # Build proves the Next.js compile is healthy. Env vars aren't needed —
        # API routes are dynamic (`dynamic = "force-dynamic"`) and the client
        # only reads NEXT_PUBLIC_* at runtime, not build time.
        run: npm run build
